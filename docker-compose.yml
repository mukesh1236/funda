version: "3.9"

# Local development with Docker — mirrors production exactly.
# Usage:
#   docker compose up --build        # start
#   docker compose down -v           # stop + remove volume
#   docker compose logs -f web       # tail logs

services:
  web:
    build: .
    ports:
      - "8100:8100"
    volumes:
      # Persist the SQLite database across container restarts
      - db_data:/data
      # Hot-reload: mount source so you don't rebuild on every code change
      - ./app:/app/app
      - ./web:/app/web
    environment:
      - RECOMMENDATIONS_DB_PATH=/data/recommendations.db
      - ENABLE_SCHEDULER=true
      - SESSION_SECRET=${SESSION_SECRET}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - FMP_API_KEY=${FMP_API_KEY:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
    driver: local
